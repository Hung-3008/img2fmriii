# =============================================================================
# FactFlow for fMRI Synthesis — Subject 1  [EXP ①+③ + DINOv2-in-context]
# Extends factflow_fmri_cross.yaml: the DiT cross-attends to BOTH feature
# streams at every t —
#   - CLIP tokens   (256, 1664)  → higher / semantic visual areas
#   - DINOv2 tokens (257, 1024)  → early visual cortex (V1–V3) that CLIP misses
# The two streams are projected separately to hidden and concatenated into one
# 513-token context. Everything else matches the `cross` run for a clean A/B.
# =============================================================================

# --- Data ---
data:
  data_dir: NSD/data/nsd
  subject: 1
  fmri_mode: zscore
  clip_feature: sdxl_clip_multi
  dino_feature: dinov2_vitl14_multilayer   # second token stream (257, 1024)
  n_voxels: 15724
  pad_to: 16384
  avg_reps: true

# --- Stage 2: Velocity model (DiT1D — native 1D) ---
stage_2:
  target: model.dit_1d.DiT1D
  params:
    seq_len: 16384
    patch_size: 32
    in_channels: 1
    hidden_size: 512
    depth: 12
    num_heads: 8
    mlp_ratio: 4.0
    y_in_channels: 1280
    learn_sigma: false
    use_qknorm: true
    use_swiglu: true
    use_rmsnorm: true
    use_rope: true
    wo_shift: false
    use_cross_attn: true
    y_token_channels: 1664       # CLIP token dim
    y_token_channels_2: 1024     # DINOv2 token dim (second context stream)
    y_token_layers: 48           # Number of CLIP feature layers
    y_token_layers_2: 4          # Number of DINOv2 feature layers

# --- Transport (Flow Matching) ---
transport:
  params:
    path_type: Linear
    prediction: velocity
    loss_weight: null
    time_dist_type: "logit-normal_-1.0_1.0"
    time_dist_shift: 16384

# --- ODE sampler ---
sampler:
  mode: ODE
  params:
    sampling_method: euler
    num_steps: 50
    atol: 1.0e-06
    rtol: 0.001
    reverse: false

# --- Losses ---
losses:
  detach_ut: false
  use_snr_weight: true

# --- Training ---
training:
  global_seed: 42
  epochs: 200
  batch_size: 32
  grad_accum_steps: 8
  num_workers: 4
  log_every: 50
  ckpt_every: 5000
  sample_every: 2000
  val_every: 5
  optimizer:
    lr: 2.0e-04
    betas: [0.9, 0.95]
    weight_decay: 0.01
  base_lr: 2.0e-04
  final_lr: 2.0e-05
  schedule_type: cosine
  warmup_steps: 500
  clip_grad: 1.0
  precision: bf16
