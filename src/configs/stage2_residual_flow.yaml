# Stage 2: Residual Flow Matching
# Regression head (z̄) + Flow network (Δz = z_true − z̄)
# Multi-layer DINOv2 with per-block learned layer mixing

data:
  root: "Data/nsd"
  subject: "subj01"
  vae_checkpoint: "results/fmri_mlp_vae/best.pt"
  roi_dir: "Data/nsddata/ppdata/subj01/func1pt8mm/roi"

dino_layers: [6, 12, 18, 24]

model:
  # Shared
  latent_dim: 1024
  context_dim: 1024
  n_context_tokens: 257
  n_dino_layers: 4
  # Regression head
  reg_n_queries: 16
  reg_depth: 4
  reg_hidden_dim: 512
  reg_num_heads: 8
  reg_mlp_ratio: 4.0
  reg_dropout: 0.1
  # Flow network
  n_latent_tokens: 16
  hidden_dim: 512
  depth: 4
  num_heads: 8
  mlp_ratio: 4.0
  dropout: 0.25

training:
  num_epochs: 3000
  batch_size: 256
  lr: 3.0e-4
  weight_decay: 0.05
  grad_clip: 1.0
  warmup_epochs: 10
  use_ema: true
  ema_decay: 0.999
  cfg_drop_prob: 0.15
  cfg_scale: 1.0
  sigma: 0.01
  ode_steps: 50
  num_trials: 1
  patience: 200
  save_every: 50
  eval_interval: 5
  prior_sigma: 1.0
  flow_weight: 1.0
  reg_warmup_epochs: 30    # train regression alone first, then add flow

output_dir: "results/stage2_residual_flow"
