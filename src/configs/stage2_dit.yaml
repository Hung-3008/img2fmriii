# Stage 2: Latent DiT Flow Matching Config

data:
  train_latents: "results/fmri_mlp_vae/latents/subj01_train_avg_latents.npy"
  test_latents: "results/fmri_mlp_vae/latents/subj01_test_avg_latents.npy"
  train_fmri: "NSD/data/mindeye_nsd/processed/subj01_train_avg.npy"
  test_fmri: "NSD/data/mindeye_nsd/processed/subj01_test_avg.npy"
  train_feat_idx: "NSD/data/mindeye_nsd/processed/subj01_train_avg_feat_idx.npy"
  test_feat_idx: "NSD/data/mindeye_nsd/processed/subj01_test_avg_feat_idx.npy"
  clip_path: "NSD/data/features/clip_vitl14_openai_subj01.npy"
  vae_checkpoint: "results/fmri_mlp_vae/best.pt"

model:
  latent_dim: 1024
  n_tokens: 16
  hidden_size: 512
  depth: 8
  n_heads: 8
  mlp_ratio: 4.0
  context_dim: 1024
  dropout: 0.1

training:
  num_epochs: 300
  batch_size: 128
  lr: 3.0e-4
  weight_decay: 0.01
  grad_clip: 1.0
  warmup_epochs: 5
  ema_decay: 0.999
  cfg_drop_prob: 0.1
  cfg_scale: 1.0
  cfm_type: "otcfm"
  sigma: 0.0
  ode_steps: 50
  patience: 100
  save_every: 25

output_dir: "results/stage2_dit"
