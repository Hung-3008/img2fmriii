# =============================================================================
# FactFlow for fMRI Synthesis — Subject 1  [EXP ①+③]
#   ① Token cross-attention: 256 CLIP tokens condition the DiT at every t
#      (not just x0), via cross-attn in each block. Fixes the ~0.16 ceiling
#      caused by image info being present only at the source.
#   ③ SNR-weighted loss: weight the velocity MSE by per-voxel noise-ceiling
#      reliability so capacity goes to learnable voxels instead of dead ones.
# Keeps the source encoder ON (anchor x0) — cross-attn and anchor are
# complementary: anchor sets a good x0, cross-attn keeps image info along the
# whole trajectory.
# =============================================================================

# --- Source encoder toggle (true = learned x0 from CLIP tokens) ---
use_source_encoder: true

# --- Data ---
data:
  data_dir: NSD/data/nsd
  subject: 1
  fmri_mode: zscore
  clip_feature: sdxl_clip
  n_voxels: 15724
  pad_to: 16384
  avg_reps: true

# --- Stage 2: Velocity model (DiT1D — native 1D) ---
stage_2:
  target: model.dit_1d.DiT1D
  params:
    seq_len: 16384
    patch_size: 32
    in_channels: 1
    hidden_size: 512
    depth: 12
    num_heads: 8
    mlp_ratio: 4.0
    y_in_channels: 1280     # SDXL CLIP pool dim (AdaLN global conditioning)
    learn_sigma: false
    use_qknorm: true
    use_swiglu: true
    use_rmsnorm: true
    use_rope: true
    wo_shift: false
    use_cross_attn: true    # ① cross-attend to CLIP tokens in every block
    y_token_channels: 1664  # SDXL CLIP token dim

# --- Source encoder (PerceiverVE): CLIP tokens → learned x₀ ---
source_encoder:
  target: model.perceiver.PerceiverVE
  params:
    in_channels: 1664
    out_channels: 64
    hidden_size: 384
    depth: 4
    num_heads: 8
    mlp_ratio: 4.0
    dropout_prob: 0.0
    num_queries: 256
    max_input_len: 256
    pos_emb_type: learned
    use_qknorm: false
    use_swiglu: true
    use_rmsnorm: true
    use_variational: true
    init_logvar: 0.0
    fixed_std: 1.0

# --- Transport (Flow Matching) ---
transport:
  params:
    path_type: Linear
    prediction: velocity
    loss_weight: null
    time_dist_type: "logit-normal_-1.0_1.0"
    time_dist_shift: 16384

# --- ODE sampler ---
sampler:
  mode: ODE
  params:
    sampling_method: euler
    num_steps: 50
    atol: 1.0e-06
    rtol: 0.001
    reverse: false

# --- Losses ---
losses:
  use_kld_loss: false
  kld_loss_type: var_kld
  kld_loss_weight: 5.0
  kld_target_std: 1.0
  kld_reduction: mean
  use_align_loss: true
  align_loss_weight: 1.0
  align_loss_type: normalized_l2
  detach_ut: false
  use_snr_weight: true      # ③ weight velocity MSE by per-voxel noise ceiling

# --- Training ---
training:
  global_seed: 42
  epochs: 200
  batch_size: 32
  grad_accum_steps: 8
  num_workers: 4
  log_every: 50
  ckpt_every: 5000
  sample_every: 2000
  val_every: 5
  optimizer:
    lr: 2.0e-04
    betas: [0.9, 0.95]
    weight_decay: 0.01
  base_lr: 2.0e-04
  final_lr: 2.0e-05
  schedule_type: cosine
  warmup_steps: 500
  clip_grad: 1.0
  precision: bf16
