# fMRI MLP VAE v2 — Stage 1 (Subject 01, 768d latent, progressive)
# Progressive: 15724 → 4096 → 2048 → 768
# n_voxels: 15724

data:
  root: "Data/nsd"
  subject: "subj01"
  train_rep_mode: "single_trial"
  test_rep_mode: "average"

model:
  n_voxels: 15724
  hidden_dims: [4096, 2048]    # progressive compression
  latent_dim: 768
  n_res_blocks: 3              # 3 blocks per stage (vs 4 total before)
  expansion: 2                  # wider ResBlocks: dim → 2*dim → dim
  dropout: 0.2

loss:
  beta_max: 0.0001              # slightly lower than 0.01, still preserves latent quality
  beta_anneal_epochs: 50
  lambda_pcc: 0.0

training:
  epochs: 200
  lr: 1.0e-4
  weight_decay: 0.01
  batch_size: 128
  grad_clip: 1.0
  seed: 42
  num_workers: 4
  save_dir: "results/subj01/fmri_mlp_vae_768_v2"
  log_interval: 50
  val_interval: 1
  use_amp: true
  early_stopping_patience: 50
