# Stage 2: Informed Prior Flow Matching (subj01)
# x0 ~ N(z̄, σ²) where z̄ = regression(DINOv2). End-to-end training.
# n_voxels: 15724, latent_dim: 768

data:
  root: "Data/nsd"
  subject: "subj01"
  vae_checkpoint: "results/subj01/fmri_mlp_vae_768/best.pt"
  roi_dir: "Data/nsddata/ppdata/subj01/func1pt8mm/roi"
  dino_suffix: "dinov2_vitb14_multilayer"

dino_layers: [3, 6, 9, 12]

model:
  # Shared context
  latent_dim: 768
  context_dim: 768
  n_context_tokens: 257
  n_dino_layers: 4
  n_pool_tokens: 128

  # Regression head (predicts informed prior center z̄)
  reg_n_queries: 16
  reg_depth: 3
  reg_hidden_dim: 512
  reg_num_heads: 8
  reg_mlp_ratio: 4.0
  reg_dropout: 0.1
  reg_output_norm: true            # LayerNorm on output, fix shrinkage (std 0.3 → ~1.0)

  # Flow network
  n_latent_tokens: 12
  hidden_dim: 512
  depth: 10
  num_heads: 8
  mlp_ratio: 4.0
  dropout: 0.1

  # Regularization
  stochastic_depth_rate: 0.15
  context_noise_std: 0.05

training:
  num_epochs: 500
  batch_size: 256
  lr: 3.0e-4
  weight_decay: 0.05
  grad_clip: 1.0
  warmup_epochs: 10
  use_ema: true
  ema_decay: 0.999
  cfg_drop_prob: 0.1
  cfg_scale: 1.0
  sigma: 0.01
  ode_steps: 50
  num_trials: 1
  patience: 100
  save_every: 50
  eval_interval: 5

  # Informed prior: ODE starts from N(z̄, prior_sigma²)
  prior_sigma: 0.3

  # Loss weights: both regression and flow contribute
  flow_weight: 1.0
  reg_weight: 1.0

  # Timestep sampling (same as single_flow_v2)
  timestep_sampling: "logit_normal"
  logit_normal_mu: 0.0
  logit_normal_sigma: 0.7

output_dir: "results/subj01/stage2_informed_flow_v2"
