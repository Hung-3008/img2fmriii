# Stage 2: Cross-Attention Regressor
# DINOv2 (257, 1024) → CrossAttn Regressor → z_pred → VAE decode → fMRI

data:
  root: "Data/nsd"
  subject: "subj01"
  vae_checkpoint: "results/fmri_mlp_vae/best.pt"

model:
  latent_dim: 1024          # VAE latent dim (output)
  context_dim: 1024         # DINOv2 token dim
  n_context_tokens: 257     # DINOv2: CLS + 256 patches
  n_queries: 16             # learnable query tokens
  hidden_dim: 512           # transformer hidden dim
  depth: 6                  # transformer layers
  num_heads: 8
  mlp_ratio: 4.0
  dropout: 0.1

training:
  num_epochs: 3000
  batch_size: 256
  lr: 3.0e-4
  weight_decay: 0.01
  grad_clip: 1.0
  warmup_epochs: 10
  ema_decay: 0.999
  patience: 200
  save_every: 50
  eval_interval: 5
  contrastive_weight: 0.5     # InfoNCE weight (0 = MSE only)
  contrastive_temp: 0.07

output_dir: "results/stage2_regressor"
