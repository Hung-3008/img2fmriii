# Stage 2: Residual Flow Matching — V3 (Sequential Freeze Training)
# Key improvements over V2:
#   - Two-phase training:
#       Phase 1 (Ep 1-60): Train Regression + Shared Context ONLY
#       Phase 2 (Ep 61+): FREEZE Regression, Train Flow ONLY
#   - Prevents "Target Shrinkage" where Flow overfits to tiny train residuals
#   - Prevents "Shared Context Memorization" from ruining generalization

data:
  root: "Data/nsd"
  subject: "subj01"
  vae_checkpoint: "results/fmri_mlp_vae_768/best.pt"
  roi_dir: "Data/nsddata/ppdata/subj01/func1pt8mm/roi"
  dino_suffix: "dinov2_vitb14_multilayer"

dino_layers: [3, 6, 9, 12]

model:
  # Shared
  latent_dim: 768
  context_dim: 768
  n_context_tokens: 257
  n_dino_layers: 4
  n_pool_tokens: 32
  # Regression head
  reg_n_queries: 16
  reg_depth: 3
  reg_hidden_dim: 512
  reg_num_heads: 8
  reg_mlp_ratio: 4.0
  reg_dropout: 0.15
  # Flow network
  n_latent_tokens: 12
  hidden_dim: 512
  depth: 4
  num_heads: 8
  mlp_ratio: 4.0
  dropout: 0.15
  # Regularization
  stochastic_depth_rate: 0.2
  context_noise_std: 0.1

training:
  num_epochs: 3000
  batch_size: 256
  lr: 3.0e-4
  weight_decay: 0.01
  grad_clip: 1.0
  warmup_epochs: 10
  use_ema: true
  ema_decay: 0.99
  cfg_drop_prob: 0.1
  cfg_scale: 1.0
  sigma: 0.01
  ode_steps: 50
  num_trials: 1
  patience: 200
  save_every: 50
  eval_interval: 5
  prior_sigma: 1.0
  flow_weight: 1.0
  reg_warmup_epochs: 60      # Train regression for 60 epochs, then FREEZE
  timestep_sampling: "logit_normal"
  logit_normal_mu: 0.0
  logit_normal_sigma: 1.0

output_dir: "results/stage2_residual_flow_v3"
