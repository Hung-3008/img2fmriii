# =============================================================================
# Regression baseline + RICHER FEATURES — Subject 1
# Same CrossAttnRegressor as regression_baseline.yaml, but the cross-attention
# now sees 4 context streams instead of 2:
#   sdxl_clip                (256, 1664)  semantic (high-level)
#   dinov2_vitl14            (257, 1024)  high-level, last layer
#   dinov2_vitl14_multilayer (4,257,1024) → (1028,1024) VISUAL HIERARCHY (low→high)
#   gabor                    (256, 24)    LOW-LEVEL energy (V1-V4, retinotopic)
# Tests whether the ~0.335 regression ceiling (CLIP+DINO-last) is raised by
# adding low-level / multi-layer features for early visual cortex.
# Requires: python src/data/extract_gabor.py --subjects 1
# =============================================================================

data:
  data_dir: NSD/data/nsd
  subject: 1
  fmri_mode: zscore
  clip_feature: sdxl_clip          # source of clip_tokens + clip_pool (AdaLN)
  n_voxels: 15724
  avg_reps: true                   # rep-averaged targets = clean conditional mean
  context_features:                # cross-attention streams (order = embedder order)
    - sdxl_clip
    - dinov2_vitl14
    - dinov2_vitl14_multilayer
    - gabor

model:
  target: model.regression_net.CrossAttnRegressor
  params:
    seq_len: 16384                 # overridden to pad_to
    patch_size: 32
    hidden_size: 512
    depth: 12
    num_heads: 8
    mlp_ratio: 4.0
    y_in_channels: 1280
    # context_dims are injected from the dataset at runtime (single source of truth)
    use_qknorm: true
    use_swiglu: true
    use_rmsnorm: true
    use_rope: true

losses:
  use_snr_weight: true

training:
  global_seed: 42
  epochs: 100
  batch_size: 32
  grad_accum_steps: 8
  num_workers: 4
  log_every: 50
  val_every: 5
  optimizer:
    lr: 1.0e-04
    betas: [0.9, 0.95]
    weight_decay: 0.01
  base_lr: 1.0e-04
  final_lr: 1.0e-05
  schedule_type: cosine
  warmup_steps: 500
  clip_grad: 1.0
  precision: bf16
