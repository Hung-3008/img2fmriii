# Stage 2: Flow Matching on Aligned Representation Space

data:
  # Pre-extracted aligned representations (from Stage 1 autoencoder)
  train_latents: "results/stage1_aligned/latents/subj01_train_avg_repr.npy"
  test_latents: "results/stage1_aligned/latents/subj01_test_avg_repr.npy"
  # Raw fMRI for validation metrics
  train_fmri: "NSD/data/mindeye_nsd/processed/subj01_train_avg.npy"
  test_fmri: "NSD/data/mindeye_nsd/processed/subj01_test_avg.npy"
  train_feat_idx: "NSD/data/mindeye_nsd/processed/subj01_train_avg_feat_idx.npy"
  test_feat_idx: "NSD/data/mindeye_nsd/processed/subj01_test_avg_feat_idx.npy"
  clip_path: "NSD/data/features/clip_vitl14_openai_subj01.npy"
  # Frozen autoencoder (decoder used for validation)
  ae_checkpoint: "results/stage1_aligned/best.pt"

model:
  # LatentDiT config for 257-token aligned space
  latent_dim: 65792     # 257 * 256 = 65792 (not used for 3D input, but needed for config)
  n_tokens: 257         # Match CLIP token count
  hidden_size: 384      # Transformer hidden dim
  depth: 6              # DiT blocks
  n_heads: 8            # Attention heads
  mlp_ratio: 4.0
  context_dim: 1024     # Full native CLIP dim for cross-attention
  dropout: 0.1

training:
  num_epochs: 150
  batch_size: 64
  lr: 3.0e-4
  weight_decay: 0.01
  grad_clip: 1.0
  warmup_epochs: 5
  ema_decay: 0.999
  cfg_drop_prob: 0.1
  cfg_scale: 1.0
  cfm_type: "icfm"      # Independent CFM (faster than OT for high-dim)
  sigma: 0.0
  ode_steps: 50
  patience: 100
  save_every: 25

output_dir: "results/stage2_aligned"
