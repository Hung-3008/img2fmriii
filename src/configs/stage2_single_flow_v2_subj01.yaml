# Stage 2: Single Flow Matching V2 (Optimized for lower MSE)
# Key changes vs V1:
#   - prior_sigma: 1.0 → 0.3  (proven +19% spcc from eval_inference analysis)
#   - val_prior_sigma: 0.3    (validate with matching prior for fair eval)
#   - ema_decay: 0.99 → 0.9999 (smoother EMA, better generation quality)
#   - mse_weight: 0.3          (auxiliary x1-prediction loss, reduces MSE directly)
#   - pcc_weight: 0.05         (auxiliary PCC loss, improves correlation)
#   - logit_normal_sigma: 0.7  (less extreme timesteps → more stable gradients)
#   - depth: 8 → 10            (more capacity for flow network)
#   - dropout: 0.15 → 0.1      (less dropout since prior_sigma is smaller)
#   - context_noise_std: 0.1 → 0.05 (less context noise)
#   - weight_decay: 0.01 → 0.05 (more regularization to combat overfitting)
# n_voxels: 15724, latent_dim: 768

data:
  root: "Data/nsd"
  subject: "subj01"
  vae_checkpoint: "results/subj01/fmri_mlp_vae_768/best.pt"
  roi_dir: "Data/nsddata/ppdata/subj01/func1pt8mm/roi"
  dino_suffix: "dinov2_vitb14_multilayer"

dino_layers: [3, 6, 9, 12]

model:
  # Shared
  latent_dim: 768
  context_dim: 768
  n_context_tokens: 257
  n_dino_layers: 4
  n_pool_tokens: 128

  # Regression head (UNUSED BUT KEPT FOR COMPATIBILITY WITH ResidualFlowSiT)
  reg_n_queries: 16
  reg_depth: 1
  reg_hidden_dim: 512
  reg_num_heads: 8
  reg_mlp_ratio: 4.0
  reg_dropout: 0.1

  # Flow network (THE ONLY PART USED)
  n_latent_tokens: 12
  hidden_dim: 512
  depth: 10           # +2 blocks vs V1 (was 8)
  num_heads: 8
  mlp_ratio: 4.0
  dropout: 0.1        # reduced (was 0.15)

  # Regularization
  stochastic_depth_rate: 0.15   # slightly reduced (was 0.2)
  context_noise_std: 0.05       # reduced (was 0.1)

training:
  num_epochs: 500
  batch_size: 256
  lr: 3.0e-4
  weight_decay: 0.05            # increased (was 0.01) to fight overfitting
  grad_clip: 1.0
  warmup_epochs: 10
  use_ema: true
  ema_decay: 0.999              # effective window ~28 epochs (9000 samples, bs=256 → 36 steps/ep)
  cfg_drop_prob: 0.1
  cfg_scale: 1.0
  sigma: 0.01
  ode_steps: 50
  num_trials: 1
  patience: 100
  save_every: 50
  eval_interval: 5

  # Prior sigma: CRITICAL FIX
  # Smaller prior → shorter ODE path → lower MSE (proven from eval_inference.csv)
  prior_sigma: 0.3              # was 1.0
  val_prior_sigma: 0.3          # validate with same sigma as training

  # Hybrid Loss Weights (NEW)
  flow_weight: 1.0
  mse_weight: 0.3               # x1-prediction auxiliary loss
  pcc_weight: 0.05              # PCC auxiliary loss

  # Timestep sampling: slightly biased toward middle timesteps
  timestep_sampling: "logit_normal"
  logit_normal_mu: 0.0
  logit_normal_sigma: 0.7       # reduced spread (was 1.0), more stable

output_dir: "results/subj01/stage2_single_flow_v2"
