data:
  subject: "subj01"
  root: "Data/nsd"
  dino_suffix: "dinov2_vitb14_multilayer"
  roi_dir: "Data/nsddata/ppdata/subj01/func1pt8mm/roi"
  vae_checkpoint: "results/subj01/stage1_moe_vae/best.pt"

flow_model: "brain_flow_dit"
dino_layers: [3, 6, 9, 12]
output_dir: "results/subj01/stage2_brain_flow_dit"

model:
  latent_dim: 768
  n_latent_tokens: 12
  context_dim: 768
  n_dino_layers: 4
  hidden_dim: 768
  depth: 6
  num_heads: 12
  mlp_ratio: 4.0
  dropout: 0.1
  drop_path_rate: 0.0
  use_regressor: true
  regressor_depth: 2

training:
  num_epochs: 150
  batch_size: 128
  lr: 0.0003
  weight_decay: 0.01
  grad_clip: 1.0
  warmup_epochs: 20
  
  # Flow matching
  sigma: 0.01          # Not used for CFG yet but for matching if using standard
  prior_sigma: 0.3     # Use 0.3 to let regression head lead more
  ode_steps: 100
  num_trials: 1
  
  # Losses
  flow_weight: 1.0
  reg_weight: 1.0
  
  # Sampling
  timestep_sampling: "logit_normal"
  logit_normal_mu: 0.0
  logit_normal_sigma: 1.0
  
  cfg_drop_prob: 0.1
  cfg_scale: 1.0
  
  use_ema: true
  ema_decay: 0.999
  eval_interval: 10
  save_every: 50
  patience: 0
