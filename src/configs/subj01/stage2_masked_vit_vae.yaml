# Stage 2: Masked Brain Modeling — Subject 01 (ViT VAE)
data:
  root: "Data/nsd"
  subject: "subj01"
  vae_checkpoint: "results/subj01/stage1_vit_vae/best.pt"
  roi_dir: "Data/nsddata/ppdata/subj01/func1pt8mm/roi"
  dino_suffix: "dinov2_vitb14_multilayer"

dino_layers: [3, 6, 9, 12]
flow_model: "brain_masked_dit"

model:
  latent_dim: 768
  n_latent_tokens: 12
  context_dim: 768
  n_dino_layers: 4
  hidden_dim: 768
  depth: 6
  num_heads: 12
  mlp_ratio: 4.0
  dropout: 0.1
  drop_path_rate: 0.1

training:
  num_epochs: 500
  batch_size: 256
  lr: 3.0e-4
  weight_decay: 0.05
  grad_clip: 1.0
  warmup_epochs: 10
  use_ema: true
  ema_decay: 0.999
  mask_ratio: 0.75
  mask_loss_only: true
  patience: 100
  save_every: 50
  eval_interval: 5

output_dir: "results/subj01/stage2_masked_vit_vae"
