# Stage 2: Informed Prior + BrainFlowDiT — Subject 01 (ViT VAE)
data:
  root: "Data/nsd"
  subject: "subj01"
  vae_checkpoint: "results/subj01/stage1_vit_vae/best.pt"
  roi_dir: "Data/nsddata/ppdata/subj01/func1pt8mm/roi"
  dino_suffix: "dinov2_vitb14_multilayer"

dino_layers: [3, 6, 9, 12]
flow_model: "brain_flow_dit"

model:
  latent_dim: 768
  n_latent_tokens: 12
  context_dim: 768
  n_dino_layers: 4
  hidden_dim: 512
  depth: 4
  num_heads: 8
  mlp_ratio: 4.0
  dropout: 0.25
  drop_path_rate: 0.15
  use_regressor: true
  regressor_depth: 2

training:
  num_epochs: 500
  batch_size: 256
  lr: 3.0e-4
  weight_decay: 0.1
  grad_clip: 1.0
  warmup_epochs: 10
  use_ema: true
  ema_decay: 0.999
  cfg_drop_prob: 0.1
  cfg_scale: 1.0
  sigma: 0.01
  ode_steps: 50
  num_trials: 1
  patience: 100
  save_every: 50
  eval_interval: 5
  prior_sigma: 0.3
  flow_weight: 1.0
  reg_weight: 1.0
  timestep_sampling: "logit_normal"
  logit_normal_mu: 0.0
  logit_normal_sigma: 0.7

output_dir: "results/subj01/stage2_informed_vit_vae"
