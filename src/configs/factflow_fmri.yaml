# =============================================================================
# FactFlow for fMRI Synthesis — Subject 1
# CLIP image features → Flow Matching → fMRI voxels
# =============================================================================

# --- Data ---
data:
  data_dir: NSD/data/nsd
  subject: 1
  fmri_mode: zscore          # "scale" or "zscore"
  clip_feature: sdxl_clip   # feature prefix
  n_voxels: 15724           # raw voxel count for subj01
  pad_to: 16384             # padded length (must be divisible by patch_size)
  avg_reps: true            # average 3 reps per image -> 9000 train samples (reduces session label-noise)
  # 1D mode — no fmri_channels / fmri_spatial needed

# --- Stage 2: Velocity model (DiT1D — native 1D) ---
stage_2:
  target: model.dit_1d.DiT1D
  params:
    seq_len: 16384           # = pad_to
    patch_size: 32           # 16384/32 = 512 tokens
    in_channels: 1           # fMRI as single-channel 1D signal
    hidden_size: 512
    depth: 12
    num_heads: 8
    mlp_ratio: 4.0
    y_in_channels: 1280     # SDXL CLIP pool dim
    learn_sigma: false
    use_qknorm: true
    use_swiglu: true
    use_rmsnorm: true
    use_rope: true
    wo_shift: false

# --- Transport (Flow Matching) ---
# Strategy 2: logit-normal(-1.0, 1.0) focuses 56% of training at t<0.3
# vs current uniform+shift=2.0 which only spends 17% at t<0.3.
# This fixes the early-trajectory weakness: r(v_pred,x1)=0.07 at t=0.
transport:
  params:
    path_type: Linear
    prediction: velocity
    loss_weight: null
    time_dist_type: "logit-normal_-1.0_1.0"   # focus on t~0.1-0.4 (weak zone)
    time_dist_shift: 16384   # = dim → shift=sqrt(16384/16384)=1.0 (no extra warp)

# --- ODE sampler ---
# num_steps=50: more steps to integrate the sharpened logit-normal trajectory
sampler:
  mode: ODE
  params:
    sampling_method: euler
    num_steps: 50
    atol: 1.0e-06
    rtol: 0.001
    reverse: false

# --- Losses ---
losses:
  detach_ut: false

# --- Training ---
training:
  global_seed: 42
  epochs: 200
  batch_size: 64
  grad_accum_steps: 8       # effective batch = 8 × 8 = 64
  num_workers: 4
  log_every: 50
  ckpt_every: 5000
  sample_every: 2000
  val_every: 5
  optimizer:
    lr: 2.0e-04
    betas: [0.9, 0.95]
    weight_decay: 0.01
  base_lr: 2.0e-04
  final_lr: 2.0e-05
  schedule_type: cosine
  warmup_steps: 500
  clip_grad: 1.0
  precision: bf16
