# fMRI MLP VAE — Stage 1 Configuration
# Encodes fMRI (15724) → latent (1024) via MLP VAE
# Designed for better latent diversity for Stage 2 Flow Matching

# ── Data ──
data:
  root: "Data/nsd"                    # path to NSD data directory
  subject: "subj01"                   # subject folder name
  train_rep_mode: "single_trial"      # 'average' | 'single_trial' | 'first'
  test_rep_mode: "average"            # test always averaged for stable eval

# ── Model ──
model:
  n_voxels: 15724
  hidden_dim: 2048
  latent_dim: 1024
  n_res_blocks: 4
  dropout: 0.1

# ── Loss ──
loss:
  beta_max: 0.01               # 10× higher than Conv2D VAE for better Gaussian prior
  beta_anneal_epochs: 30
  lambda_pcc: 0.5

# ── Training ──
training:
  epochs: 200
  lr: 1.0e-4
  weight_decay: 0.01
  batch_size: 128
  grad_clip: 1.0
  seed: 42
  num_workers: 4
  save_dir: "results/fmri_mlp_vae"
  log_interval: 50
  val_interval: 1
  use_amp: true
  early_stopping_patience: 50
