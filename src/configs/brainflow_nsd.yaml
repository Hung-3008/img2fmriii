# =====================================================================
# BrainFlow NSD — CSFM v2 (Optimized Architecture)
# =====================================================================
# Fixes applied:
#   - Variance-only regularization (no μ penalty, avoids KLD-align fight)
#   - Smaller DiT: 3 blocks × 512 hidden (was 6 × 768)
#   - Smaller SourceEncoder: 2 queries × 256 hidden × 1 layer
#   - detach_ut=false for full gradient flow
# =====================================================================

data_dir: NSD/data/nsd
subject: 1
n_voxels: 15724
fmri_mode: zscore

# --- VAE (frozen, Stage 1) ---
vae:
  checkpoint: outputs/fmri_vae_nsd/best.pt
  latent_dim: 256

# --- Feature files ---
features:
  dinov2:
    pool: nsd_dinov2_vitl14_pool_{mode}_sub{sub}.npy
    dim: 1024
  clip:
    pool: nsd_sdxl_clip_pool_{mode}_sub{sub}.npy
    dim: 1664
  qwen:
    pool: nsd_qwen3vl_pool_{mode}_sub{sub}.npy
    dim: 2048

modality_dims: [1024, 1664, 2048]

fmri:
  train: nsd_train_fmri_zscore_sub{sub}.npy
  test: nsd_test_fmri_zscore_sub{sub}.npy
  n_reps: 3

# =====================================================================
# Model config
# =====================================================================
brainflow:
  output_dim: 256
  var_reg_weight: 0.01                # Variance regularization (σ near 1)
  align_weight: 0.5                   # Alignment (μ → target)
  detach_ut: false                    # Flow loss gradient → SourceEncoder

  # Source Encoder (lightweight Perceiver)
  source_encoder:
    hidden_dim: 256
    output_dim: 256
    n_queries: 2
    n_layers: 1
    n_heads: 8
    dropout: 0.1
    init_logvar: 0.0

  # Velocity Network (compact DiT)
  dit_net:
    output_dim: 256
    hidden_dim: 512
    n_blocks: 3
    n_heads: 8
    dropout: 0.25

# =====================================================================
# CSFM Transport config
# =====================================================================
transport:
  path_type: Linear
  prediction: velocity
  time_dist_type: uniform
  time_dist_shift: 1.0

# =====================================================================
# Solver (validation ODE inference)
# =====================================================================
solver_args:
  method: dopri5
  time_points: 50
  cfg_scale: 0.0

# =====================================================================
# Training
# =====================================================================
training:
  n_epochs: 300
  lr: 2.0e-4
  weight_decay: 0.05
  warmup_ratio: 0.1
  min_lr: 1.0e-5
  grad_clip: 1.0
  use_amp: true
  log_every_n_steps: 10
  val_every_n_epochs: 10
  ema_decay: 0.999
  batch_size: 64
  val_batch_size: 128
  num_workers: 4
  feat_noise_std: 0.1
  mixup_alpha: 0.4

output_dir: outputs/brainflow_nsd
