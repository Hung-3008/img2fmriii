# Multi-Layer DINOv2 Flow Matching — V6 (Attention Pooling)
# Based on V5 (logit-normal, EMA, ViT-B/14 768d, etc)
# Key fixing change:
#   - context_mode: attention_pool 
#   - n_pool_tokens: 32 (compress 257 patches to 32 per layer)
#   - Preserves spatial info (prevents V5 underfitting)
#   - Reduces context size (4x32=128 tokens vs 1028 in V3, prevents overfitting)
#   - lr: 3e-4 (higher than V5 for faster learning, allowed because of pooling)

data:
  root: "Data/nsd"
  subject: "subj01"
  vae_checkpoint: "results/fmri_mlp_vae_768/best.pt"
  roi_dir: "Data/nsddata/ppdata/subj01/func1pt8mm/roi"
  dino_suffix: "dinov2_vitb14_multilayer"

dino_layers: [3, 6, 9, 12]

model:
  latent_dim: 768
  context_dim: 768
  n_context_tokens: 257
  n_dino_layers: 4
  n_latent_tokens: 12       # 768 / 64 = 12
  hidden_dim: 512
  depth: 6
  num_heads: 8
  mlp_ratio: 4.0
  dropout: 0.1
  context_mode: "attention_pool"
  n_pool_tokens: 32

training:
  num_epochs: 3000
  batch_size: 256
  lr: 3.0e-4
  weight_decay: 0.01
  grad_clip: 1.0
  warmup_epochs: 10
  use_ema: true
  ema_decay: 0.99
  cfg_drop_prob: 0.1
  cfg_scale: 1.0
  sigma: 0.01
  latent_noise_std: 0.05
  ode_steps: 50
  num_trials: 1
  patience: 200
  save_every: 50
  eval_interval: 5
  prior_sigma: 1.0
  timestep_sampling: "logit_normal"
  logit_normal_mu: 0.0
  logit_normal_sigma: 1.0

output_dir: "results/stage2_multilayer_v6"
