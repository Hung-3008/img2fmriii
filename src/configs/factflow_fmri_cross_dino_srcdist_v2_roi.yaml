# =============================================================================
# FactFlow fMRI — Subject 1  [srcdist v2 + ROI-aware]
# Extends factflow_fmri_cross_dino_srcdist_v2.yaml with:
#   1) auto_pad — per-subject native sizing (no dead padding).
#   2) ROI conditioning — voxels reordered by streams-7 ROI; a per-patch ROI
#      embedding + an optional within-ROI masked self-attention branch run
#      ALONGSIDE the CLIP/DINOv2 cross-attention. Both ROI components are
#      zero-initialised, so the model starts identical to the non-ROI DiT and
#      learns the ROI structure on top (clean A/B vs the base config).
# Requires roi_meta_sub{S}.npz (build with: python src/data/build_roi_meta.py).
# =============================================================================

use_source_encoder: true
eval_use_mean: true

# --- Data ---
data:
  data_dir: NSD/data/nsd
  subject: 1
  fmri_mode: zscore
  clip_feature: sdxl_clip
  dino_feature: dinov2_vitl14
  n_voxels: 15724
  pad_to: 16384          # fallback; overridden when auto_pad=true (sub1 → 15744)
  auto_pad: true         # size seq_len/num_queries to this subject's voxels
  avg_reps: true

# --- Stage 2: Velocity model (DiT1D — native 1D) ---
stage_2:
  target: model.dit_1d.DiT1D
  params:
    seq_len: 16384
    patch_size: 32
    in_channels: 1
    hidden_size: 512
    depth: 12
    num_heads: 8
    mlp_ratio: 4.0
    y_in_channels: 1280
    learn_sigma: false
    use_qknorm: true
    use_swiglu: true
    use_rmsnorm: true
    use_rope: true
    wo_shift: false
    use_cross_attn: true
    y_token_channels: 1664       # CLIP token dim
    y_token_channels_2: 1024     # DINOv2 token dim (second context stream)
    use_roi: true                # per-patch ROI embedding (streams-7) + reorder
    n_roi: 8                     # streams 1..7 + "other"(0); pad id = n_roi
    roi_masked_attn: true        # within-ROI masked self-attention branch

# --- Source encoder (PerceiverVE): CLIP tokens → learned source DISTRIBUTION ---
source_encoder:
  target: model.perceiver.PerceiverVE
  params:
    in_channels: 1664
    out_channels: 64
    hidden_size: 384
    depth: 4
    num_heads: 8
    mlp_ratio: 4.0
    dropout_prob: 0.0
    num_queries: 256
    max_input_len: 256
    pos_emb_type: learned
    use_qknorm: false
    use_swiglu: true
    use_rmsnorm: true
    use_variational: true
    use_per_token_logvar: false
    init_logvar: 0.0
    fixed_std: null               # σ learned, but floored by clip_logvar_min below

# --- Transport (Flow Matching) ---
transport:
  params:
    path_type: Linear
    prediction: velocity
    loss_weight: null
    time_dist_type: "logit-normal_-1.0_1.0"
    time_dist_shift: 16384         # base; set to pad_to by auto_pad (shift→1.0)

# --- ODE sampler ---
sampler:
  mode: ODE
  params:
    sampling_method: euler
    num_steps: 50
    atol: 1.0e-06
    rtol: 0.001
    reverse: false

# --- Losses ---
losses:
  use_kld_loss: true
  kld_loss_type: kld             # FULL KLD (incl. -μ²)
  kld_loss_weight: 0.05
  kld_target_std: 1.0
  kld_reduction: mean
  clip_logvar_min: -1.4          # σ floor ≈ 0.5 — keeps x₀ noisy, blocks collapse
  clip_logvar_max: 10.0
  use_align_loss: false
  use_recon_loss: false
  recon_loss_type: pearson
  recon_loss_weight: 0.0
  detach_ut: false
  use_snr_weight: true

# --- Training ---
training:
  global_seed: 42
  epochs: 100
  batch_size: 32
  grad_accum_steps: 8
  num_workers: 4
  log_every: 50
  ckpt_every: 5000
  sample_every: 2000
  val_every: 5
  optimizer:
    lr: 1.0e-04
    betas: [0.9, 0.95]
    weight_decay: 0.01
  base_lr: 1.0e-04
  final_lr: 1.0e-05
  schedule_type: cosine
  warmup_steps: 500
  clip_grad: 1.0
  precision: bf16
