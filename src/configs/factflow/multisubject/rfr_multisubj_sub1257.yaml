# ==============================================================================
# FactFlow — Subject-Conditioned Flow Matching (Direction B ONLY, NO source)
# Joint training: subjects 1, 2, 5, 7 (NSD)
# ------------------------------------------------------------------------------
# B: c = t_emb + y_emb + s_emb — subject-conditioned AdaLN
# Source: x₀ ~ N(0, I)  (pure Gaussian — Direction A disabled)
#
# Conditioning (DiT):
#   - AdaLN      ← clip_pool + subject_emb
#   - cross-attn ← dinov2_vitg14_multilayer4p + gabor
#
# Fine-tune new subject: freeze DiT; only train subject_emb[new_id] (+ router)
# ==============================================================================
eval_noise_scale: 0.01

# ── Multi-subject ──────────────────────────────────────────────────────────────
data:
  data_dir: NSD/data/nsd
  subjects: [1, 2, 5, 7]            # list → MultiSubjectfMRIDataset
  common_seq_len: 15744              # Sub1's pad_to (largest)
  sub1:
    n_voxels: 15724
    pad_to: 15744
  sub2:
    n_voxels: 14278
    pad_to: 14304
  sub5:
    n_voxels: 13039
    pad_to: 13056
  sub7:
    n_voxels: 12682
    pad_to: 12704
  n_voxels: 15724                    # fallback (Sub1)
  pad_to: 15744                      # fallback
  subdirs:
    fmri: fmri
    sdxl_clip: clip
    dinov2_vitg14_multilayer4p: dino
    gabor: gabor
  fmri_mode: zscore
  clip_feature: sdxl_clip
  auto_pad: true
  roi_order: true
  avg_reps: true
  context_features:
  - dinov2_vitg14_multilayer4p   # contexts[0] → DiT cross-attn
  - gabor                         # contexts[1] → DiT cross-attn

# ── Source encoder (Direction A) — DISABLED ────────────────────────────────────
source_encoder:
  enabled: false

# ── Subject conditioning (Direction B) ────────────────────────────────────────
subject_cond:
  enabled: true
  mode: learned            # "learned" | "zero_shot"
  n_subjects: 4            # [Sub1, Sub2, Sub5, Sub7] → indices [0,1,2,3]
  subject_dropout: 0.1     # 10% → unconditional fallback (null token)

# ── Velocity network ──────────────────────────────────────────────────────────
stage_2:
  target: model.dit_1d.DiT1D
  params:
    seq_len: 15744             # common_seq_len
    patch_size: 32
    in_channels: 1
    hidden_size: 512
    depth: 12
    num_heads: 8
    mlp_ratio: 4.0
    y_in_channels: 1280
    learn_sigma: false
    use_qknorm: true
    use_swiglu: true
    use_rmsnorm: true
    use_rope: true
    wo_shift: false
    use_cross_attn: true
    use_roi_routing: true
    n_roi_buckets: 3
    roi_emb_dim: 64
    # Subject conditioning
    use_subject_cond: true
    n_subjects: 4
    subject_dropout: 0.1
    subject_cond_mode: learned

# ── Transport ──────────────────────────────────────────────────────────────────
transport:
  params:
    path_type: Linear
    prediction: velocity
    loss_weight: null
    time_dist_type: logit-normal_-1.0_1.0
    time_dist_shift: 15744

# ── Sampler ────────────────────────────────────────────────────────────────────
sampler:
  mode: ODE
  params:
    sampling_method: euler
    num_steps: 50
    atol: 1.0e-06
    rtol: 0.001
    reverse: false

# ── Loss ───────────────────────────────────────────────────────────────────────
losses:
  use_snr_weight: true

# ── Training ───────────────────────────────────────────────────────────────────
# batch_size=16, grad_accum=16 → effective batch=256
training:
  global_seed: 42
  epochs: 50
  batch_size: 16
  grad_accum_steps: 16
  num_workers: 2
  pin_memory: false
  log_every: 50
  ckpt_every: 5000
  sample_every: 2000
  val_every: 5
  optimizer:
    lr: 0.0001
    betas:
    - 0.9
    - 0.95
    weight_decay: 0.01
  base_lr: 0.0001
  final_lr: 1.0e-05
  schedule_type: cosine
  warmup_steps: 500
  clip_grad: 1.0
  precision: bf16
