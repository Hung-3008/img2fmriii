# ==============================================================================
# FactFlow fMRI — MULTI-SUBJECT (shared trunk + per-subject adapters)
# ------------------------------------------------------------------------------
# Leave-one-out: TRAIN on subjects {1, 2, 5}; subject 7 is held out for the
# few-shot head-fit evaluation (see eval_factflow_fewshot.py).
#
# Shared trunk = transformer blocks + t/CLIP/cross-attn embedders.
# Per-subject  = input patch-embed + output readout (selected by subject_id).
# All subjects padded to pad_to = 16384 (2^14) so the patch grid is identical;
# flow matching runs in native-padded voxel space -> metrics stay native-space
# (directly comparable to MindEye2 / SynBrain).
# ==============================================================================
eval_noise_scale: 0.01
data:
  data_dir: NSD/data/nsd
  subdirs:
    fmri: fmri
    sdxl_clip: clip
    dinov2_vitg14_multilayer4p: dino
    gabor: gabor
  subjects: [1, 2, 5]
  n_voxels_map:
    1: 15724
    2: 14278
    5: 13039
    7: 12682          # held out; listed for reference / few-shot eval
  fmri_mode: zscore
  clip_feature: sdxl_clip
  pad_to: 16384
  roi_order: true
  avg_reps: true
  context_features:
  - dinov2_vitg14_multilayer4p
  - gabor
stage_2:
  target: model.dit_1d.DiT1D
  params:
    seq_len: 16384
    patch_size: 32
    in_channels: 1
    hidden_size: 512
    depth: 12
    num_heads: 8
    mlp_ratio: 4.0
    y_in_channels: 1280
    learn_sigma: false
    use_qknorm: true
    use_swiglu: true
    use_rmsnorm: true
    use_rope: true
    wo_shift: false
    use_cross_attn: true
    use_roi_routing: false
    n_subjects: 3          # = len(subjects); also injected by the trainer
transport:
  params:
    path_type: Linear
    prediction: velocity
    loss_weight: null
    time_dist_type: logit-normal_-1.0_1.0
    time_dist_shift: 16384
sampler:
  mode: ODE
  params:
    sampling_method: euler
    num_steps: 50
    atol: 1.0e-06
    rtol: 0.001
    reverse: false
losses:
  use_snr_weight: true
training:
  global_seed: 42
  epochs: 50
  batch_size: 32
  grad_accum_steps: 8
  num_workers: 2
  pin_memory: false
  log_every: 50
  ckpt_every: 5000
  val_every: 5
  optimizer:
    lr: 0.0001
    betas:
    - 0.9
    - 0.95
    weight_decay: 0.01
  base_lr: 0.0001
  final_lr: 1.0e-05
  schedule_type: cosine
  warmup_steps: 500
  clip_grad: 1.0
  precision: bf16
