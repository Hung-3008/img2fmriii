# ==============================================================================
# Ablation: CLIP-ONLY (every feature path fed by sdxl_clip / ViT-bigG-14)
# ------------------------------------------------------------------------------
# Counterpart to factflow/ablation/factflow_fmri_ablation_multidino_gabor_sub1.yaml
# but with NO DINO and NO Gabor. All three feature paths come from CLIP:
#   - source encoder (PerceiverVE)  ← clip_tokens = sdxl_clip          (256, 1664)
#   - AdaLN conditioning            ← clip_pool   = sdxl_clip_pool     (1280)
#   - cross-attention               ← sdxl_clip_multilayer  (8, 257, 1664)
#                                       flattened per-sample to (8*257, 1664)=(2056,1664)
#
# Isolates how far a pure-CLIP feature set gets. Compare against:
#   - exps/srcdist_v2_gabor_sub1 (DINO+Gabor enriched, val_voxel_r ~0.40 @ ep50)
#   - the multidino_gabor ablation (cross-attn = multiDINO + Gabor)
#
# Cross-attn context count is data-driven (train_ds.context_dims), so swapping the
# streams needs no code change. To add the single-layer 256-token stream as well,
# set context_features: [sdxl_clip, sdxl_clip_multilayer] (both live in clip/).
# ==============================================================================
use_source_encoder: true
eval_use_mean: true
data:
  data_dir: NSD/data/nsd
  subdirs:
    fmri: fmri
    sdxl_clip: clip
    sdxl_clip_multilayer: clip
  subject: 1
  fmri_mode: zscore
  clip_feature: sdxl_clip
  n_voxels: 15724
  pad_to: 15744
  auto_pad: true
  roi_order: true
  avg_reps: true
  context_features:
  - sdxl_clip_multilayer
stage_2:
  target: model.dit_1d.DiT1D
  params:
    seq_len: 15744
    patch_size: 32
    in_channels: 1
    hidden_size: 512
    depth: 12
    num_heads: 8
    mlp_ratio: 4.0
    y_in_channels: 1280
    learn_sigma: false
    use_qknorm: true
    use_swiglu: true
    use_rmsnorm: true
    use_rope: true
    wo_shift: false
    use_cross_attn: true
source_encoder:
  target: model.perceiver.PerceiverVE
  params:
    in_channels: 1664
    out_channels: 64
    hidden_size: 384
    depth: 4
    num_heads: 8
    mlp_ratio: 4.0
    dropout_prob: 0.0
    num_queries: 246
    max_input_len: 256
    pos_emb_type: learned
    use_qknorm: false
    use_swiglu: true
    use_rmsnorm: true
    use_variational: true
    use_per_token_logvar: false
    init_logvar: 0.0
    fixed_std: null
transport:
  params:
    path_type: Linear
    prediction: velocity
    loss_weight: null
    time_dist_type: logit-normal_-1.0_1.0
    time_dist_shift: 15744
sampler:
  mode: ODE
  params:
    sampling_method: euler
    num_steps: 50
    atol: 1.0e-06
    rtol: 0.001
    reverse: false
losses:
  use_kld_loss: true
  kld_loss_type: kld
  kld_loss_weight: 0.05
  kld_target_std: 1.0
  kld_reduction: mean
  clip_logvar_min: -1.4
  clip_logvar_max: 10.0
  use_align_loss: false
  use_recon_loss: false
  recon_loss_type: pearson
  recon_loss_weight: 0.0
  detach_ut: false
  use_snr_weight: true
training:
  global_seed: 42
  epochs: 50
  batch_size: 32
  grad_accum_steps: 8
  num_workers: 4
  log_every: 50
  ckpt_every: 5000
  sample_every: 2000
  val_every: 5
  optimizer:
    lr: 0.0001
    betas:
    - 0.9
    - 0.95
    weight_decay: 0.01
  base_lr: 0.0001
  final_lr: 1.0e-05
  schedule_type: cosine
  warmup_steps: 500
  clip_grad: 1.0
  precision: bf16
