# ==============================================================================
# FactFlow fMRI synthesis — no-source flow matching, subject 5
# ------------------------------------------------------------------------------
# Standard flow matching: x0 ~ N(0, I) -> velocity matching -> fMRI voxels.
# Conditioning:
#   - AdaLN      <- clip_pool = sdxl_clip_pool                  (1280)
#   - cross-attn <- dinov2_vitg14_multilayer4p (4, 257, 1536) + gabor (256, 24)
# At eval, x0 is scaled by eval_noise_scale (~0 -> near-deterministic selection).
# ==============================================================================
eval_noise_scale: 0.01
data:
  data_dir: NSD/data/nsd
  subdirs:
    fmri: fmri
    sdxl_clip: clip
    dinov2_vitg14_multilayer4p: dino
    gabor: gabor
  subject: 5
  fmri_mode: zscore
  clip_feature: sdxl_clip
  n_voxels: 13039
  pad_to: 13056
  auto_pad: true
  roi_order: true
  avg_reps: true
  context_features:
  - dinov2_vitg14_multilayer4p
  - gabor
stage_2:
  target: model.dit_1d.DiT1D
  params:
    seq_len: 13056
    patch_size: 32
    in_channels: 1
    hidden_size: 512
    depth: 12
    num_heads: 8
    mlp_ratio: 4.0
    y_in_channels: 1280
    learn_sigma: false
    use_qknorm: true
    use_swiglu: true
    use_rmsnorm: true
    use_rope: true
    wo_shift: false
    use_cross_attn: true
transport:
  params:
    path_type: Linear
    prediction: velocity
    loss_weight: null
    time_dist_type: logit-normal_-1.0_1.0
    time_dist_shift: 13056
sampler:
  mode: ODE
  params:
    sampling_method: euler
    num_steps: 50
    atol: 1.0e-06
    rtol: 0.001
    reverse: false
losses:
  use_snr_weight: true
training:
  global_seed: 42
  epochs: 50
  batch_size: 32
  grad_accum_steps: 8
  num_workers: 2
  pin_memory: false
  log_every: 50
  ckpt_every: 5000
  sample_every: 2000
  val_every: 5
  optimizer:
    lr: 0.0001
    betas:
    - 0.9
    - 0.95
    weight_decay: 0.01
  base_lr: 0.0001
  final_lr: 1.0e-05
  schedule_type: cosine
  warmup_steps: 500
  clip_grad: 1.0
  precision: bf16
