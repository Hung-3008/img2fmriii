# ==============================================================================
# Ablation: DINO-ONLY (every feature path fed by dinov2_vitg14 / ViT-G/14)
# Subject 2
# ------------------------------------------------------------------------------
# All three feature paths come from DINOv2:
#   - source encoder (PerceiverVE)  ← dino_tokens = dinov2_vitg14        (256, 1536)
#   - AdaLN conditioning            ← dino_pool   = dinov2_vitg14_pool   (1536)
#   - cross-attention               ← dinov2_vitg14_multilayer4p (4, 65, 1536)
# ==============================================================================
use_source_encoder: true
eval_use_mean: true
data:
  data_dir: NSD/data/nsd
  subdirs:
    fmri: fmri
    dinov2_vitg14: dino
    dinov2_vitg14_multilayer4p: dino
  subject: 2
  fmri_mode: zscore
  clip_feature: dinov2_vitg14
  n_voxels: 14278
  pad_to: 16384
  auto_pad: true
  roi_order: true
  avg_reps: true
  context_features:
  - dinov2_vitg14_multilayer4p
stage_2:
  target: model.dit_1d.DiT1D
  params:
    seq_len: 16384
    patch_size: 32
    in_channels: 1
    hidden_size: 512
    depth: 12
    num_heads: 8
    mlp_ratio: 4.0
    y_in_channels: 1536
    learn_sigma: false
    use_qknorm: true
    use_swiglu: true
    use_rmsnorm: true
    use_rope: true
    wo_shift: false
    use_cross_attn: true
source_encoder:
  target: model.perceiver.PerceiverVE
  params:
    in_channels: 1536
    out_channels: 64
    hidden_size: 384
    depth: 4
    num_heads: 8
    mlp_ratio: 4.0
    dropout_prob: 0.0
    num_queries: 256
    max_input_len: 257
    pos_emb_type: learned
    use_qknorm: false
    use_swiglu: true
    use_rmsnorm: true
    use_variational: true
    use_per_token_logvar: false
    init_logvar: 0.0
    fixed_std: null
transport:
  params:
    path_type: Linear
    prediction: velocity
    loss_weight: null
    time_dist_type: logit-normal_-1.0_1.0
    time_dist_shift: 16384
sampler:
  mode: ODE
  params:
    sampling_method: euler
    num_steps: 50
    atol: 1.0e-06
    rtol: 0.001
    reverse: false
losses:
  use_kld_loss: true
  kld_loss_type: kld
  kld_loss_weight: 0.05
  kld_target_std: 1.0
  kld_reduction: mean
  clip_logvar_min: -1.4
  clip_logvar_max: 10.0
  use_align_loss: false
  use_recon_loss: false
  recon_loss_type: pearson
  recon_loss_weight: 0.0
  detach_ut: false
  use_snr_weight: true
training:
  global_seed: 42
  epochs: 50
  batch_size: 32
  grad_accum_steps: 8
  num_workers: 2
  pin_memory: false
  log_every: 50
  ckpt_every: 5000
  sample_every: 2000
  val_every: 5
  optimizer:
    lr: 0.0001
    betas:
    - 0.9
    - 0.95
    weight_decay: 0.01
  base_lr: 0.0001
  final_lr: 1.0e-05
  schedule_type: cosine
  warmup_steps: 500
  clip_grad: 1.0
  precision: bf16
