# ==============================================================================
# CLIP source/conditioning + cross-attn = DINOv2(4L) + Gabor [PER-TRIAL]
# ------------------------------------------------------------------------------
# Goal: get a real gain from combining backbones by making the cross-attention
# carry features ORTHOGONAL to CLIP, instead of stacking redundant high-level ViT
# streams (clip_dino showed CLIP-8L + DINO-8L ≈ CLIP-only, both semantic/redundant).
#
#   - source encoder (PerceiverVE)  ← clip_tokens = sdxl_clip            (256, 1664)
#   - AdaLN conditioning            ← clip_pool   = sdxl_clip_pool       (1280)
#   - cross-attention               ← dinov2_vitg14_multilayer4p (4, 257, 1536) → 1028 tok
#                                   + gabor                     (256, 24)       →  256 tok
#                                     (DINO multilayer flattened per-sample to (L*257, D))
#
# CLIP is NOT in cross-attn here (it already feeds source + AdaLN). The cross-attn
# adds DINO hierarchy (4 layers) + Gabor (V1-like low-level retinotopic) — the
# orthogonal/low-level signal that the project established as the real ceiling
# lever (see srcdist_v2_gabor ≈ 0.40).
#
# POOLED FEATURES: cross-attn DINO uses the 65-token pooled file (multilayer4p,
# 8×8 grid + CLS) → ~340 cross-attn tokens, batch 32 fits the 24 GB GPU. Working
# set ≈ 6.7 GB (DINO4p) + CLIP source ≈ 14 GB ≪ 46 GB RAM → fits page cache even
# on HDD; no NVMe symlink / systemd-oomd workaround needed.
#
# MAIN CHANGE — per-trial training (avg_reps=false): 9000 images × 3 reps = 27000
# samples instead of 9000 rep-averaged. Per-trial training provides 3x more data
# and acts as regularisation against overfitting on averaged targets. Validation
# remains rep-averaged (avg_reps=True) for clean, comparable metrics.
# ==============================================================================
use_source_encoder: true
eval_use_mean: true
data:
  data_dir: NSD/data/nsd
  subdirs:
    fmri: fmri
    sdxl_clip: clip
    dinov2_vitg14_multilayer4p: dino
    gabor: gabor
  subject: 1
  fmri_mode: zscore
  clip_feature: sdxl_clip
  n_voxels: 15724
  pad_to: 15744
  auto_pad: true
  roi_order: true
  avg_reps: false  # PER-TRIAL: 9000x3 = 27000 training samples instead of 9000 averaged
  context_features:
  - dinov2_vitg14_multilayer4p
  - gabor
stage_2:
  target: model.dit_1d.DiT1D
  params:
    seq_len: 15744
    patch_size: 32
    in_channels: 1
    hidden_size: 512
    depth: 12
    num_heads: 8
    mlp_ratio: 4.0
    y_in_channels: 1280
    learn_sigma: false
    use_qknorm: true
    use_swiglu: true
    use_rmsnorm: true
    use_rope: true
    wo_shift: false
    use_cross_attn: true
source_encoder:
  target: model.perceiver.PerceiverVE
  params:
    in_channels: 1664
    out_channels: 64
    hidden_size: 384
    depth: 4
    num_heads: 8
    mlp_ratio: 4.0
    dropout_prob: 0.0
    num_queries: 246
    max_input_len: 256
    pos_emb_type: learned
    use_qknorm: false
    use_swiglu: true
    use_rmsnorm: true
    use_variational: true
    use_per_token_logvar: false
    init_logvar: 0.0
    fixed_std: null
transport:
  params:
    path_type: Linear
    prediction: velocity
    loss_weight: null
    time_dist_type: logit-normal_-1.0_1.0
    time_dist_shift: 15744
sampler:
  mode: ODE
  params:
    sampling_method: euler
    num_steps: 50
    atol: 1.0e-06
    rtol: 0.001
    reverse: false
losses:
  use_kld_loss: true
  kld_loss_type: kld
  kld_loss_weight: 0.05
  kld_target_std: 1.0
  kld_reduction: mean
  clip_logvar_min: -1.4
  clip_logvar_max: 10.0
  use_align_loss: false
  use_recon_loss: false
  recon_loss_type: pearson
  recon_loss_weight: 0.0
  detach_ut: false
  use_snr_weight: true
training:
  global_seed: 42
  epochs: 100        # Scaled up epochs (100 instead of 50) to allow more steps for larger dataset
  batch_size: 32
  grad_accum_steps: 8
  num_workers: 4     # Increased workers to 4 for faster data loading with larger dataset
  pin_memory: false  # pinned RAM is non-reclaimable → raises memory PSI → systemd-oomd kill
  log_every: 50
  ckpt_every: 5000
  sample_every: 2000
  val_every: 5
  optimizer:
    lr: 0.0001
    betas:
    - 0.9
    - 0.95
    weight_decay: 0.01
  base_lr: 0.0001
  final_lr: 1.0e-05
  schedule_type: cosine
  warmup_steps: 500
  clip_grad: 1.0
  precision: bf16
