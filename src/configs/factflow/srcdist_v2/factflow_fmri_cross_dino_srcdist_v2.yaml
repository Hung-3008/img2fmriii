# =============================================================================
# FactFlow fMRI — Subject 1  [srcdist v2: STABILISED against decoder collapse]
# v1 (factflow_fmri_cross_dino_srcdist.yaml) collapsed: learned σ shrank to the
# clamp floor (≈0) → x₀≈μ→x₁ → velocity≈0 (diff/recon→0, kld saturated) → the
# PerceiverVE memorised the training fMRI and val_voxel_r dropped (0.157→0.108).
#
# Fix (Hướng A — keep an informed source but stop the collapse):
#   1) σ FLOOR via clip_logvar_min=-1.4 (σ≥~0.5). The sampled x₀=μ+ε·σ now
#      always carries real noise, so uₜ=x₁-x₀ never degenerates to 0 — the flow
#      always has a denoising job and cannot be short-circuited by μ→x₁.
#   2) kld_loss_weight 0.005→0.05 (×10) to hold q(x₀|c) nearer the N(0,I) prior.
#   3) recon loss OFF — on the linear path it is minimised by the SAME x₀→x₁
#      collapse (x̂₁=xₜ when v≈0), so it amplified the failure instead of adding
#      an independent, metric-aligned signal.
#   4) lr 2e-4→1e-4 — 83M params on 9000 images overfits/collapses fast.
#
# Expectation: diff/recon settle at a NON-zero denoising residual, kld stays
# bounded (σ pinned near the floor, not blowing up), val_voxel_r keeps climbing.
# Watch the inline-eval "[src σ=… corr(μ,x₁)=…]": σ≈0.5 (floored, healthy),
# corr(μ,x₁) moderate (informed, not →1 = not a pure copy).
# =============================================================================

use_source_encoder: true
eval_use_mean: true

# --- Data ---
data:
  data_dir: NSD/data/nsd
  subdirs:
    fmri: fmri
    sdxl_clip: clip
    dinov2_vitl14: dino
    dinov2_vitl14_multilayer: dino
    gabor: gabor
  subject: 1
  fmri_mode: zscore
  clip_feature: sdxl_clip
  dino_feature: dinov2_vitl14
  n_voxels: 15724
  pad_to: 16384          # fallback; overridden when auto_pad=true (sub1 → 15744)
  auto_pad: true         # size seq_len/num_queries to this subject's voxels (drop dead padding)
  avg_reps: true

# --- Stage 2: Velocity model (DiT1D — native 1D) ---
stage_2:
  target: model.dit_1d.DiT1D
  params:
    seq_len: 16384
    patch_size: 32
    in_channels: 1
    hidden_size: 512
    depth: 12
    num_heads: 8
    mlp_ratio: 4.0
    y_in_channels: 1280
    learn_sigma: false
    use_qknorm: true
    use_swiglu: true
    use_rmsnorm: true
    use_rope: true
    wo_shift: false
    use_cross_attn: true
    y_token_channels: 1664       # CLIP token dim
    y_token_channels_2: 1024     # DINOv2 token dim (second context stream)

# --- Source encoder (PerceiverVE): CLIP tokens → learned source DISTRIBUTION ---
source_encoder:
  target: model.perceiver.PerceiverVE
  params:
    in_channels: 1664
    out_channels: 64
    hidden_size: 384
    depth: 4
    num_heads: 8
    mlp_ratio: 4.0
    dropout_prob: 0.0
    num_queries: 256
    max_input_len: 256
    pos_emb_type: learned
    use_qknorm: false
    use_swiglu: true
    use_rmsnorm: true
    use_variational: true
    use_per_token_logvar: false
    init_logvar: 0.0
    fixed_std: null               # σ learned, but floored by clip_logvar_min below

# --- Transport (Flow Matching) ---
transport:
  params:
    path_type: Linear
    prediction: velocity
    loss_weight: null
    time_dist_type: "logit-normal_-1.0_1.0"
    time_dist_shift: 16384

# --- ODE sampler ---
sampler:
  mode: ODE
  params:
    sampling_method: euler
    num_steps: 50
    atol: 1.0e-06
    rtol: 0.001
    reverse: false

# --- Losses ---
losses:
  use_kld_loss: true
  kld_loss_type: kld             # FULL KLD (incl. -μ²)
  kld_loss_weight: 0.05          # ×10 vs v1 — hold q(x₀|c) near the prior
  kld_target_std: 1.0
  kld_reduction: mean
  clip_logvar_min: -1.4          # σ floor ≈ 0.5 — KEEPS x₀ noisy, blocks collapse
  clip_logvar_max: 10.0
  use_align_loss: false
  use_recon_loss: false          # OFF — rewarded the x₀→x₁ collapse on linear path
  recon_loss_type: pearson
  recon_loss_weight: 0.0
  detach_ut: false
  use_snr_weight: true

# --- Training ---
training:
  global_seed: 42
  epochs: 200
  batch_size: 32
  grad_accum_steps: 8
  num_workers: 4
  log_every: 50
  ckpt_every: 5000
  sample_every: 2000
  val_every: 5
  optimizer:
    lr: 1.0e-04                  # halved vs v1 — slow the overfit/collapse
    betas: [0.9, 0.95]
    weight_decay: 0.01
  base_lr: 1.0e-04
  final_lr: 1.0e-05
  schedule_type: cosine
  warmup_steps: 500
  clip_grad: 1.0
  precision: bf16
