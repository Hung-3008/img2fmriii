# Stage 2: Flow Matching with online VAE encoding + DINOv2 CLS conditioning
# SynBrain-style data mapping

data:
  root: "Data/nsd"
  subject: "subj01"
  vae_checkpoint: "results/fmri_mlp_vae/best.pt"

model:
  latent_dim: 1024        # MLP VAE latent dim
  hidden_dim: 2048        # Flow MLP width
  depth: 8                # Number of adaLN-Zero blocks
  context_dim: 1024       # DINOv2 ViT-L CLS token dim
  dropout: 0.1

training:
  num_epochs: 3000
  batch_size: 256
  lr: 3.0e-4
  weight_decay: 0.01
  grad_clip: 1.0
  warmup_epochs: 5
  ema_decay: 0.999
  cfg_drop_prob: 0.1
  cfg_scale: 1.0
  cond_noise_std: 0.0
  cfm_type: "icfm"
  sigma: 0.0
  ode_steps: 50
  num_trials: 1             # number of ODE generations to average (1 = single shot)
  patience: 100
  save_every: 25
  eval_interval: 5            # run validation every N epochs

output_dir: "results/stage2_dinov2_online"
