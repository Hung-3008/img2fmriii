# Stage 2: Conditional Flow Matching with Cross-Attention SiT
# x₀ ~ N(0,σ) → CrossSiT v_θ(t, x_t | DINOv2) → z_fmri → VAE → fMRI

data:
  root: "Data/nsd"
  subject: "subj01"
  vae_checkpoint: "results/fmri_mlp_vae/best.pt"

model:
  latent_dim: 1024          # VAE latent dim
  context_dim: 1024         # DINOv2 token dim
  n_context_tokens: 257     # DINOv2: CLS + 256 patches
  n_latent_tokens: 16       # patchify: 1024 / 16 = 64 per token
  hidden_dim: 512           # SiT hidden dim
  depth: 6                  # SiT blocks (self-attn + cross-attn + FFN each)
  num_heads: 8              # attention heads
  mlp_ratio: 4.0
  dropout: 0.1

training:
  num_epochs: 3000
  batch_size: 256
  lr: 3.0e-4
  weight_decay: 0.01
  grad_clip: 1.0
  warmup_epochs: 10
  ema_decay: 0.999
  cfg_drop_prob: 0.1
  cfg_scale: 1.0
  sigma: 0.0
  ode_steps: 50
  num_trials: 1
  patience: 200
  save_every: 50
  eval_interval: 5
  prior_sigma: 1.0             # Gaussian prior scale: x₀ ~ N(0, prior_sigma²)

output_dir: "results/stage2_cfm"
