# Multi-Layer DINOv2 Flow Matching — V5 (CLS Concat + Logit-Normal)
# Based on V3 with key anti-overfit changes:
#   - context_mode: cls_concat (CLS-only, no cross-attention)
#   - DINOv2 ViT-B/14 (768d)
#   - VAE latent_dim: 768
#   - timestep_sampling: logit_normal
#   - Reduced regularization (dropout 0.15, weight_decay 0.01)
#   - lr: 1e-4 (lower than V3)
#   - use_ema: true

data:
  root: "Data/nsd"
  subject: "subj01"
  vae_checkpoint: "results/fmri_mlp_vae_768/best.pt"
  roi_dir: "Data/nsddata/ppdata/subj01/func1pt8mm/roi"
  dino_suffix: "dinov2_vitb14_multilayer"

dino_layers: [3, 6, 9, 12]

model:
  latent_dim: 768
  context_dim: 768
  n_context_tokens: 257
  n_dino_layers: 4
  n_latent_tokens: 12       # 768 / 64 = 12
  hidden_dim: 512
  depth: 6
  num_heads: 8
  mlp_ratio: 4.0
  dropout: 0.15
  context_mode: "cls_concat"

training:
  num_epochs: 3000
  batch_size: 256
  lr: 1.0e-4
  weight_decay: 0.01
  grad_clip: 1.0
  warmup_epochs: 10
  use_ema: true
  ema_decay: 0.9999
  cfg_drop_prob: 0.1
  cfg_scale: 1.0
  sigma: 0.01
  latent_noise_std: 0.05
  ode_steps: 50
  num_trials: 1
  patience: 200
  save_every: 50
  eval_interval: 5
  prior_sigma: 1.0
  timestep_sampling: "logit_normal"
  logit_normal_mu: 0.0
  logit_normal_sigma: 1.0

output_dir: "results/stage2_multilayer_v5"
