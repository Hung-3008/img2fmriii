# Stage 1: MoE VAE — Subject 07 (n_voxels: 12682)
model_type: "moe"

data:
  root: "Data/nsd"
  subject: "subj07"
  train_rep_mode: "single_trial"
  test_rep_mode: "average"

model:
  n_voxels: 12682
  hidden_dim: 2048
  latent_dim: 768
  n_res_blocks: 4
  n_experts: 4
  top_k: 2
  expansion: 2
  dropout: 0.1
  load_balance_weight: 0.01

loss:
  beta_max: 0.01
  beta_anneal_epochs: 30
  lambda_pcc: 0.5

training:
  epochs: 200
  lr: 1.0e-4
  weight_decay: 0.01
  batch_size: 128
  grad_clip: 1.0
  seed: 42
  num_workers: 4
  save_dir: "results/subj07/stage1_moe_vae"
  log_interval: 50
  val_interval: 1
  use_amp: true
  early_stopping_patience: 50
