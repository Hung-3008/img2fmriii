# =============================================================================
# FactFlow for fMRI — Subject 1  [cross + DINOv2 + GENUINE SOURCE DISTRIBUTION]
# Derived from factflow_fmri_cross_dino.yaml. Two changes to the objective:
#
#   1) Flow loss stays MSE on the velocity (theoretically required — the
#      minimiser is E[uₜ|xₜ,t], which is what makes the ODE integrate to the
#      right place). A correlation-aware *auxiliary* is added on the
#      reconstructed target x̂₁ = xₜ + (1-t)·v_pred, scored with profile
#      Pearson r — this rewards the voxel_pearson eval metric without breaking
#      flow matching (PCC is scale/shift-invariant, so it can NOT be the
#      velocity loss).
#
#   2) The PerceiverVE source is turned into a real conditional distribution
#      q(x₀|c) = N(μ(c), diag(σ²(c))) instead of "target + fixed noise":
#        - align loss OFF      (no longer forcing μ ≈ fMRI → no decoder collapse)
#        - fixed_std: null     (σ becomes LEARNED via log_var_head)
#        - KLD ON, type=`kld`  (FULL KLD incl. -μ² term → pulls toward the
#          N(0,I) prior, preventing μ from collapsing onto x₁; var-only KLD
#          would leave μ free and let the flow drive μ→x₁ = a decoder again)
#      The encoder is shaped purely through the flow loss + KLD prior, so it
#      learns a useful *source distribution*, not an fMRI estimate.
#
# Tune `kld_loss_weight` (β):
#   β→∞   q→N(0,I), source = pure noise (info only via cross-attn)
#   β mid q = informative but spread-out prior  ← target regime
#   β→0   μ→x₁, deterministic decoder (avoid)
# Watch the inline-eval diagnostic "[src σ=… corr(μ,x₁)=…]":
#   want σ NOT collapsing to 0, and corr(μ,x₁) LOW while val voxel_r stays high.
# =============================================================================

use_source_encoder: true
eval_use_mean: true            # eval/sample from μ (deterministic) for stable metric

# --- Data ---
data:
  data_dir: NSD/data/nsd
  subject: 1
  fmri_mode: zscore
  clip_feature: sdxl_clip
  dino_feature: dinov2_vitl14
  n_voxels: 15724
  pad_to: 16384
  avg_reps: true

# --- Stage 2: Velocity model (DiT1D — native 1D) ---
stage_2:
  target: model.dit_1d.DiT1D
  params:
    seq_len: 16384
    patch_size: 32
    in_channels: 1
    hidden_size: 512
    depth: 12
    num_heads: 8
    mlp_ratio: 4.0
    y_in_channels: 1280
    learn_sigma: false
    use_qknorm: true
    use_swiglu: true
    use_rmsnorm: true
    use_rope: true
    wo_shift: false
    use_cross_attn: true
    y_token_channels: 1664       # CLIP token dim
    y_token_channels_2: 1024     # DINOv2 token dim (second context stream)

# --- Source encoder (PerceiverVE): CLIP tokens → learned source DISTRIBUTION ---
source_encoder:
  target: model.perceiver.PerceiverVE
  params:
    in_channels: 1664
    out_channels: 64
    hidden_size: 384
    depth: 4
    num_heads: 8
    mlp_ratio: 4.0
    dropout_prob: 0.0
    num_queries: 256
    max_input_len: 256
    pos_emb_type: learned
    use_qknorm: false
    use_swiglu: true
    use_rmsnorm: true
    use_variational: true
    use_per_token_logvar: false   # learned σ per latent dim (set true for 1 σ/token)
    init_logvar: 0.0
    fixed_std: null               # null → log_var_head active → σ is LEARNED

# --- Transport (Flow Matching) ---
transport:
  params:
    path_type: Linear
    prediction: velocity
    loss_weight: null
    time_dist_type: "logit-normal_-1.0_1.0"
    time_dist_shift: 16384

# --- ODE sampler ---
sampler:
  mode: ODE
  params:
    sampling_method: euler
    num_steps: 50
    atol: 1.0e-06
    rtol: 0.001
    reverse: false

# --- Losses ---
losses:
  # Source distribution regulariser (the "real distribution" prior)
  use_kld_loss: true
  kld_loss_type: kld             # FULL KLD (incl. -μ²); NOT var_kld
  kld_loss_weight: 0.005         # β — tune; start small, raise until μ leaves x₁
  kld_target_std: 1.0
  kld_reduction: mean
  clip_logvar_min: -10.0
  clip_logvar_max: 10.0
  # Alignment OFF — stop forcing the source to look like an fMRI
  use_align_loss: false
  # Correlation-aware reconstruction on x̂₁ (metric-aligned auxiliary)
  use_recon_loss: true
  recon_loss_type: pearson       # 1 - profile Pearson r over voxels
  recon_loss_weight: 0.25
  detach_ut: false
  use_snr_weight: true

# --- Training ---
training:
  global_seed: 42
  epochs: 200
  batch_size: 32
  grad_accum_steps: 8
  num_workers: 4
  log_every: 50
  ckpt_every: 5000
  sample_every: 2000
  val_every: 5
  optimizer:
    lr: 2.0e-04
    betas: [0.9, 0.95]
    weight_decay: 0.01
  base_lr: 2.0e-04
  final_lr: 2.0e-05
  schedule_type: cosine
  warmup_steps: 500
  clip_grad: 1.0
  precision: bf16
