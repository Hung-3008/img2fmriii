# Stage 2: Informed Prior + AdaLN Flow — Subject 02
data:
  root: "Data/nsd"
  subject: "subj02"
  vae_checkpoint: "results/subj02/stage1_moe_vae/best.pt"
  roi_dir: "Data/nsddata/ppdata/subj02/func1pt8mm/roi"
  dino_suffix: "dinov2_vitb14_multilayer"

dino_layers: [3, 6, 9, 12]
flow_model: "simple_adaln"

model:
  latent_dim: 768
  context_dim: 768
  n_context_tokens: 257
  n_dino_layers: 4
  n_pool_tokens: 128
  reg_n_queries: 16
  reg_depth: 3
  reg_hidden_dim: 512
  reg_num_heads: 8
  reg_mlp_ratio: 4.0
  reg_dropout: 0.1
  reg_output_norm: true
  n_latent_tokens: 12
  hidden_dim: 512
  depth: 4
  num_heads: 8
  mlp_ratio: 4.0
  dropout: 0.1
  stochastic_depth_rate: 0.15
  context_noise_std: 0.05

simple_flow:
  latent_dim: 768
  context_dim: 768
  hidden_dim: 768
  depth: 8
  dropout: 0.1
  cond_dim: 512
  dino_layer_idx: 3
  pool_method: "cls"

training:
  num_epochs: 500
  batch_size: 256
  lr: 3.0e-4
  weight_decay: 0.05
  grad_clip: 1.0
  warmup_epochs: 10
  use_ema: true
  ema_decay: 0.999
  cfg_drop_prob: 0.1
  cfg_scale: 1.0
  sigma: 0.01
  ode_steps: 50
  num_trials: 1
  patience: 100
  save_every: 50
  eval_interval: 5
  prior_sigma: 0.3
  flow_weight: 1.0
  reg_weight: 1.0
  timestep_sampling: "logit_normal"
  logit_normal_mu: 0.0
  logit_normal_sigma: 0.7

output_dir: "results/subj02/stage2_informed_adaln"
