# fMRI BrainViT VAE — Stage 1 (Subject 02)
# ViT Architecture: Patch sequence encoding

model_type: "vit"

data:
  root: "Data/nsd"
  subject: "subj02"
  train_rep_mode: "single_trial"
  test_rep_mode: "average"

model:
  n_voxels: 14278
  patch_size: 112        # 14336 / 128 = 112 (requires 58 padding)
  embed_dim: 512
  depth: 6
  heads: 8
  mlp_ratio: 4.0
  latent_dim: 768
  dropout: 0.1

loss:
  beta_max: 0.0001
  beta_anneal_epochs: 50
  lambda_pcc: 0.0

training:
  epochs: 150
  lr: 2.0e-4             # slightly higher LR usually works well for ViTs
  weight_decay: 0.03     # ViTs benefit from higher WD
  batch_size: 128
  grad_clip: 1.0
  seed: 42
  num_workers: 4
  save_dir: "results/subj02/stage1_vit_vae"
  log_interval: 50
  val_interval: 1
  use_amp: true
  early_stopping_patience: 0
